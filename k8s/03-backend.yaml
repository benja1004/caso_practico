apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: saludconnect
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: saludconnect-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: saludconnect-config }
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: saludconnect-secrets, key: DJANGO_SECRET_KEY }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: saludconnect-secrets, key: POSTGRES_PASSWORD }
          ports: [{ containerPort: 8000 }]
          readinessProbe:
            httpGet: { path: /api/v1/auth/login/, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/v1/auth/login/, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: saludconnect
spec:
  selector: { app: backend }
  ports: [{ port: 8000, targetPort: 8000 }]
